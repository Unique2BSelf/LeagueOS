<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#97ddff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Badge background -->
  <rect x="10" y="10" width="180" height="180" rx="20" ry="20" 
        fill="url(#grad)" stroke="#263238" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="90" r="55" fill="none" stroke="#263238" stroke-width="3" opacity="0.5"/>
  
  <!-- Badge icon - star for ranks, circle for merit badges -->
  <polygon points="100,45 108,75 140,75 115,95 125,125 100,105 75,125 85,95 60,75 92,75" fill="#263238" opacity="0.3"/>
  
  <!-- Eagle palm for eagle rank -->
  
  
  <!-- Badge name -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="16" font-weight="bold" fill="white" 
        style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
    First Class
  </text>
  
  
</svg>